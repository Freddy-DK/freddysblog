title: Freddys blog
description: Learn something new… – then Teach someone!
author: Freddy Kristiansen

url: "https://freddysblog.com"
baseurl: ""

timezone: Europe/Copenhagen

theme: minima
permalink: /:year/:month/:day/:title/

# Only these pages appear in the header navigation. Without this, minima
# lists every page with a title — including all generated tag/category
# archive pages.
header_pages:
  - categories.md
  - tags.md

# Show the first paragraph of each post on the home page listing.
show_excerpts: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives

# Tag and category archive pages (the reason we build with GitHub Actions
# instead of the restricted github-pages build container).
jekyll-archives:
  enabled:
    - tags
    - categories
  layout: archive
  permalinks:
    tag: /tag/:name/
    category: /category/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
